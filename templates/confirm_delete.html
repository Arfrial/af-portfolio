<!DOCTYPE html>
<html>
<head>
<title>Confirm Delete</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#333;
}

/* Card */

.container{
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
width:420px;
}

/* Header */

h1{
margin-bottom:15px;
color:#222;
}

/* Fish name */

.catch-name{
font-size:1.3rem;
font-weight:600;
margin:20px 0;
color:#2a5298;
}

/* Buttons */

.btn{
padding:10px 20px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

/* Delete */

.delete-btn{
background:#e53935;
color:white;
}

.delete-btn:hover{
background:#c62828;
}

/* Cancel */

.cancel-btn{
display:inline-block;
margin-left:10px;
text-decoration:none;
background:#eee;
color:#333;
padding:10px 20px;
border-radius:8px;
}

.cancel-btn:hover{
background:#ddd;
}

</style>

</head>

<body>

<div class="container">

<h1>Confirm Delete</h1>

<p>Are you sure you want to delete this catch?</p>

<div class="catch-name">
{{ catch[0] }}
</div>

<form method="post" style="display:inline;">
<button type="submit" class="btn delete-btn">Delete</button>
</form>

<a href="/fish" class="cancel-btn">Cancel</a>

</div>

</body>
</html>
